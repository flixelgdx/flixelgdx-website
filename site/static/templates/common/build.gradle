/*
 * Root build script generated by the FlixelGDX project generator.
 * - Java {{JAVA_VERSION}}+ (FlixelGDX requires 17 at minimum).
 * - Pulls the framework from JitPack (no local install needed).
 * - Kotlin plugin versions live in pluginManagement {} in settings.gradle.
 */
allprojects {
  version = "0.0.1"
  group = "{{PACKAGE_NAME}}"
  repositories {
    mavenCentral()
    google()
    maven {
      url 'https://jitpack.io'
      // Restrict JitPack to only FlixelGDX artifacts. io.github.berstanio
      // (gdx-svmhelper 2.0.1+) lives on Maven Central, not JitPack; without
      // this filter Gradle tries JitPack first and gets a 401 for it.
      content {
        includeGroupByRegex 'com\\.github\\..*'
        includeGroupByRegex 'io\\.github\\.flixelgdx.*'
      }
    }
  }
}
{{GRADLE_EXPERT_APPEND}}
